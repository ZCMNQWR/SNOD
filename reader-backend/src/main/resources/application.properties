# Application properties with environment-backed placeholders
# Copy secrets into environment variables (do not commit secrets)

server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Datasource (populate via env DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/readerdb}

# Google OAuth2 placeholders — configure via environment variables or secrets
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:3000/oauth2/callback}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT placeholder for later use
app.jwt.secret=${JWT_SECRET:change-me}
spring.application.name=doc-reader-backend

# Database connection settings
# Prefer using `DATABASE_URL` or environment variables to provide credentials.
# Example (set in environment or CI):
# DATABASE_URL=jdbc:postgresql://localhost:5432/document_reader
# or set username/password individually:
# DB_USERNAME=postgres
# DB_PASSWORD=your-db-password

# If you need separate username/password instead of DATABASE_URL, uncomment and set:
# spring.datasource.username=${DB_USERNAME:}
# spring.datasource.password=${DB_PASSWORD:}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS settings
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# Multipart configuration
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-swallow-size=200MB